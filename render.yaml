services:
  - type: web
    name: flashpulse-ai
    env: docker
    repo: https://github.com/Abhi0p2005/FlashPulse-AI
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /health
